<svg width="100%" viewBox="0 0 860 180" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes floatItachi {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-8px); }
    }
    @keyframes spinSharingan {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes spinReverse {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }
    @keyframes twinkle {
      0%,100% { opacity:1; r:1.5px; }
      50%      { opacity:0.2; r:0.8px; }
    }
    @keyframes fadeInOut {
      0%,100% { opacity:0.15; }
      50%      { opacity:0.5; }
    }
    @keyframes slideText {
      0%   { opacity:0; transform:translateX(-12px); }
      15%  { opacity:1; transform:translateX(0); }
      85%  { opacity:1; transform:translateX(0); }
      100% { opacity:0; transform:translateX(12px); }
    }
    @keyframes crowFly {
      0%   { transform: translate(0,0) rotate(0deg); opacity:0; }
      10%  { opacity:1; }
      50%  { transform: translate(120px,-40px) rotate(-15deg); opacity:0.8; }
      90%  { opacity:0.3; }
      100% { transform: translate(260px,-20px) rotate(10deg); opacity:0; }
    }
    @keyframes crowFly2 {
      0%   { transform: translate(0,0) rotate(0deg); opacity:0; }
      10%  { opacity:0.9; }
      50%  { transform: translate(100px,-55px) rotate(10deg); opacity:0.7; }
      90%  { opacity:0.2; }
      100% { transform: translate(220px,-25px) rotate(-5deg); opacity:0; }
    }
    @keyframes crowFly3 {
      0%   { transform: translate(0,0) rotate(0deg); opacity:0; }
      15%  { opacity:0.8; }
      50%  { transform: translate(80px,-30px) rotate(20deg); opacity:0.6; }
      90%  { opacity:0.2; }
      100% { transform: translate(180px,-10px) rotate(-10deg); opacity:0; }
    }
    @keyframes glowPulse {
      0%,100% { opacity:0.4; }
      50%      { opacity:0.9; }
    }
    @keyframes particleDrift {
      0%   { transform:translateY(0) translateX(0); opacity:0.7; }
      100% { transform:translateY(-60px) translateX(20px); opacity:0; }
    }
    @keyframes particleDrift2 {
      0%   { transform:translateY(0) translateX(0); opacity:0.6; }
      100% { transform:translateY(-50px) translateX(-15px); opacity:0; }
    }
    @keyframes borderGlow {
      0%,100% { stroke-opacity:0.4; }
      50%      { stroke-opacity:1; }
    }
  </style>

  <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#000000"/>
    <stop offset="40%"  stop-color="#0a0008"/>
    <stop offset="100%" stop-color="#000000"/>
  </linearGradient>
  <linearGradient id="redGlow" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#cc0000" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#ffffff"/>
    <stop offset="50%"  stop-color="#ff6666"/>
    <stop offset="100%" stop-color="#ffffff"/>
  </linearGradient>
  <clipPath id="bannerClip">
    <rect width="860" height="180" rx="12"/>
  </clipPath>
</defs>

<g clip-path="url(#bannerClip)">

  <rect width="860" height="180" fill="url(#bgGrad)"/>

  <rect width="860" height="180" fill="url(#redGlow)"/>

  <rect x="0" y="0" width="860" height="180" fill="none" stroke="#cc0000" stroke-width="1.5" rx="12"
        style="animation: borderGlow 2s ease-in-out infinite;"/>

  <circle cx="50"  cy="20"  r="1.5" fill="white" style="animation: twinkle 2.1s infinite 0.0s;"/>
  <circle cx="130" cy="12"  r="1"   fill="white" style="animation: twinkle 1.7s infinite 0.4s;"/>
  <circle cx="210" cy="30"  r="1.5" fill="white" style="animation: twinkle 2.5s infinite 0.8s;"/>
  <circle cx="320" cy="8"   r="1"   fill="white" style="animation: twinkle 1.9s infinite 0.2s;"/>
  <circle cx="420" cy="22"  r="1.5" fill="white" style="animation: twinkle 2.3s infinite 1.1s;"/>
  <circle cx="530" cy="10"  r="1"   fill="white" style="animation: twinkle 1.6s infinite 0.6s;"/>
  <circle cx="640" cy="28"  r="1.5" fill="white" style="animation: twinkle 2.7s infinite 0.3s;"/>
  <circle cx="750" cy="15"  r="1"   fill="white" style="animation: twinkle 2.0s infinite 0.9s;"/>
  <circle cx="810" cy="35"  r="1.5" fill="white" style="animation: twinkle 1.8s infinite 1.3s;"/>
  <circle cx="90"  cy="45"  r="1"   fill="white" style="animation: twinkle 2.4s infinite 0.5s;"/>
  <circle cx="480" cy="40"  r="1"   fill="white" style="animation: twinkle 1.5s infinite 1.5s;"/>
  <circle cx="700" cy="50"  r="1"   fill="white" style="animation: twinkle 2.2s infinite 0.7s;"/>

  <ellipse cx="180" cy="90" rx="60" ry="60" fill="#cc0000" opacity="0.04"
           style="animation: fadeInOut 3s ease-in-out infinite;"/>
  <ellipse cx="680" cy="90" rx="60" ry="60" fill="#cc0000" opacity="0.04"
           style="animation: fadeInOut 3s ease-in-out infinite 1.5s;"/>

  <circle cx="80"  cy="130" r="2" fill="#cc0000" opacity="0.6"
          style="animation: particleDrift 4s ease-out infinite 0s;"/>
  <circle cx="160" cy="150" r="1.5" fill="#ff4400" opacity="0.5"
          style="animation: particleDrift2 3.5s ease-out infinite 1s;"/>
  <circle cx="700" cy="140" r="2" fill="#cc0000" opacity="0.6"
          style="animation: particleDrift 4.5s ease-out infinite 2s;"/>
  <circle cx="780" cy="120" r="1.5" fill="#ff4400" opacity="0.5"
          style="animation: particleDrift2 3s ease-out infinite 0.5s;"/>

  <g style="animation: crowFly 6s ease-in-out infinite 0s;">
    <path d="M 60 110 C 63 106 67 106 70 110 C 67 108 63 108 60 110 Z" fill="#1a0020"/>
    <path d="M 65 107 L 65 112" stroke="#1a0020" stroke-width="1" fill="none"/>
  </g>
  <g style="animation: crowFly2 6s ease-in-out infinite 1.2s;">
    <path d="M 55 120 C 58 116 62 116 65 120 C 62 118 58 118 55 120 Z" fill="#1a0020"/>
    <path d="M 60 117 L 60 122" stroke="#1a0020" stroke-width="1" fill="none"/>
  </g>
  <g style="animation: crowFly3 6s ease-in-out infinite 2.5s;">
    <path d="M 50 130 C 53 126 57 126 60 130 C 57 128 53 128 50 130 Z" fill="#220015"/>
    <path d="M 55 127 L 55 132" stroke="#220015" stroke-width="1" fill="none"/>
  </g>

  <g style="animation: floatItachi 4s ease-in-out infinite; transform-origin: 130px 90px;">
    <ellipse cx="130" cy="160" rx="35" ry="6" fill="#cc0000" opacity="0.2"
             style="animation: glowPulse 4s ease-in-out infinite;"/>
    <rect x="108" y="70" width="44" height="88" rx="6" fill="#1a0020"/>
    <rect x="112" y="75" width="36" height="50" rx="4" fill="#0d0015"/>
    <rect x="114" y="78" width="32" height="8" rx="2" fill="#cc0000" opacity="0.8"/>
    <rect x="114" y="78" width="32" height="4" rx="2" fill="#ff3300" opacity="0.4"/>
    <rect x="118" y="90" width="10" height="6" rx="3" fill="#cc0000" opacity="0.9"/>
    <rect x="132" y="90" width="10" height="6" rx="3" fill="#cc0000" opacity="0.9"/>
    <circle cx="121" cy="93" r="2.5" fill="#ff0000"/>
    <circle cx="135" cy="93" r="2.5" fill="#ff0000"/>
    <circle cx="121" cy="93" r="1"   fill="#220000"/>
    <circle cx="135" cy="93" r="1"   fill="#220000"/>
    <rect x="121" y="100" width="18" height="10" rx="4" fill="#2a1520"/>
    <ellipse cx="130" cy="104" rx="4" ry="2" fill="#1a0015"/>
    <polygon points="115,70 108,52 120,66" fill="#1a0020"/>
    <polygon points="145,70 152,52 140,66" fill="#1a0020"/>
    <polygon points="105,70 95,48 115,62"  fill="#1a0020"/>
    <polygon points="155,70 165,48 145,62" fill="#1a0020"/>
    <rect x="100" y="120" width="12" height="28" rx="5" fill="#1a0020"/>
    <rect x="148" y="120" width="12" height="28" rx="5" fill="#1a0020"/>
    <ellipse cx="106" cy="150" rx="7" ry="5" fill="#f0e0d0"/>
    <ellipse cx="154" cy="150" rx="7" ry="5" fill="#f0e0d0"/>
    <rect x="110" y="148" width="24" height="10" rx="4" fill="#1a0020"/>
    <rect x="111" y="148" width="22" height="6"  rx="3" fill="#111118"/>
    <rect x="113" y="154" width="10" height="4"  rx="2" fill="#cc3300"/>
    <rect x="127" y="154" width="10" height="4"  rx="2" fill="#cc3300"/>
    <rect x="112" y="154" width="10" height="2"  rx="1" fill="white" opacity="0.4"/>
    <rect x="126" y="154" width="10" height="2"  rx="1" fill="white" opacity="0.4"/>
    <rect x="116" y="110" width="28" height="14" rx="3" fill="#2a0030"/>
    <rect x="120" y="113" width="20" height="3"  rx="1" fill="#cc0000" opacity="0.6"/>
    <rect x="122" y="118" width="16" height="3"  rx="1" fill="#cc0000" opacity="0.4"/>
  </g>

  <g style="transform-origin: 690px 90px; animation: spinSharingan 8s linear infinite;">
    <circle cx="690" cy="90" r="50" fill="none" stroke="#cc0000" stroke-width="1" opacity="0.6"/>
    <path d="M690 40 L686 55 L690 65 L694 55 Z" fill="#cc0000" opacity="0.7"/>
    <path d="M690 140 L686 125 L690 115 L694 125 Z" fill="#cc0000" opacity="0.7"/>
    <path d="M640 90 L655 86 L665 90 L655 94 Z" fill="#cc0000" opacity="0.7"/>
    <path d="M740 90 L725 86 L715 90 L725 94 Z" fill="#cc0000" opacity="0.7"/>
  </g>
  <g style="transform-origin: 690px 90px; animation: spinReverse 5s linear infinite;">
    <circle cx="690" cy="90" r="35" fill="none" stroke="#880000" stroke-width="0.8" opacity="0.5"/>
    <path d="M690 55 Q700 72 690 75 Q680 72 690 55 Z" fill="#cc0000" opacity="0.8"/>
    <path d="M718 72 Q704 82 700 90 Q696 80 718 72 Z" fill="#cc0000" opacity="0.8"/>
    <path d="M662 72 Q676 82 680 90 Q684 80 662 72 Z" fill="#cc0000" opacity="0.8"/>
  </g>
  <circle cx="690" cy="90" r="18" fill="#0d0010" stroke="#cc0000" stroke-width="1.5"
          style="animation: glowPulse 2s ease-in-out infinite;"/>
  <circle cx="690" cy="90" r="12" fill="#cc0000" opacity="0.15"/>
  <circle cx="690" cy="90" r="7"  fill="#cc0000" opacity="0.5"
          style="animation: glowPulse 1s ease-in-out infinite;"/>
  <circle cx="690" cy="90" r="3"  fill="#ff3300"/>
  <circle cx="690" cy="90" r="50" fill="none" stroke="#cc0000" stroke-width="0.5" opacity="0.2"
          style="animation: glowPulse 3s ease-in-out infinite;"/>

  <line x1="240" y1="20"  x2="240" y2="160" stroke="#cc0000" stroke-width="0.5" opacity="0.3"/>
  <line x1="600" y1="20"  x2="600" y2="160" stroke="#cc0000" stroke-width="0.5" opacity="0.3"/>

  <text x="420" y="65" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="38" font-weight="700"
        fill="url(#textGrad)" opacity="0.95">alvesthzin-art</text>

  <text x="420" y="90" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="11" font-weight="400"
        fill="#888888" letter-spacing="4">— UCHIHA CLAN —</text>

  <text x="420" y="118" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="13" font-weight="400"
        fill="#cc4444" font-style="italic"
        style="animation: slideText 6s ease-in-out infinite;">
    I determine my own destiny.
  </text>

  <text x="420" y="140" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="10" font-weight="400"
        fill="#555555" letter-spacing="2">DEVELOPER · CREATOR · EVOLVING</text>

</g>
</svg>
